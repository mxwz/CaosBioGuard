<!DOCTYPE html>
<html>
<head>
    <title>人脸识别上传测试</title>
    <meta charset="utf-8">
</head>
<body>
    <h1>人脸识别图片上传测试</h1>
    <form id="uploadForm" enctype="multipart/form-data">
        <input type="file" id="fileInput" name="file" accept="image/*" required>
        <button type="submit">上传并检测</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new FormData();
            const fileInput = document.getElementById('fileInput');
            formData.append('file', fileInput.files[0]);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('result').innerHTML = '<p style="color: red;">错误: ' + data.error + '</p>';
                } else {
                    document.getElementById('result').innerHTML =
                        '<h2>检测结果</h2>' +
                        '<p>状态: ' + data.message + '</p>' +
                        '<p>匹配姓名: ' + data.matched_name + '</p>' +
                        '<p>相似度: ' + data.similarity.toFixed(2) + '</p>';
                }
            })
            .catch(error => {
                document.getElementById('result').innerHTML = '<p style="color: red;">请求失败: ' + error + '</p>';
            });
        });
    </script>
</body>
</html>
