{% extends "layout.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>枚举管理</h3>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-list-ul me-2"></i> 自定义枚举值
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle me-2"></i>
                    此处配置用于人脸录入时的下拉选项，多个值请用英文逗号分隔。
                </div>
                
                <div class="accordion" id="enumsAccordion">
                    {% for key, values in enums.items() %}
                    <div class="accordion-item">
                        <h2 class="accordion-header" id="heading{{ loop.index }}">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{ loop.index }}">
                                {{ key }}
                            </button>
                        </h2>
                        <div id="collapse{{ loop.index }}" class="accordion-collapse collapse" data-bs-parent="#enumsAccordion">
                            <div class="accordion-body">
                                <form action="{{ url_for('settings_enums') }}" method="post">
                                    <input type="hidden" name="key" value="{{ key }}">
                                    <div class="input-group">
                                        <input type="text" class="form-control" name="values" value="{{ values | join(',') }}">
                                        <button class="btn btn-outline-secondary" type="submit">
                                            <i class="fas fa-save me-1"></i> 保存
                                        </button>
                                    </div>
                                    <div class="form-text">当前值: {{ values | join(', ') }}</div>
                                </form>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
