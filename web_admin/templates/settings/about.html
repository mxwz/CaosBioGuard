{% extends "layout.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>关于系统</h3>
</div>

<div class="row">
    <div class="col-md-10 mx-auto">
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <!-- Markdown Content Container -->
                <div class="markdown-body">
                    {{ content | safe }}
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* GitHub-like Markdown CSS */
    .markdown-body {
        font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;
        font-size: 16px;
        line-height: 1.6;
        color: #24292e;
    }
    
    /* 修复 HTML 内部元素解析丢失样式的问题 */
    .markdown-body div[align="center"] {
        text-align: center;
    }
    .markdown-body div[align="center"] img {
        margin: 0 auto;
        display: inline-block;
    }
    
    .markdown-body h1 {
        font-size: 2em;
        border-bottom: 1px solid #eaecef;
        padding-bottom: 0.3em;
        margin-bottom: 16px;
        font-weight: 600;
    }
    
    .markdown-body h2 {
        font-size: 1.5em;
        border-bottom: 1px solid #eaecef;
        padding-bottom: 0.3em;
        margin-top: 24px;
        margin-bottom: 16px;
        font-weight: 600;
    }
    
    .markdown-body h3 {
        font-size: 1.25em;
        margin-top: 24px;
        margin-bottom: 16px;
        font-weight: 600;
    }
    
    .markdown-body p {
        margin-bottom: 16px;
    }
    
    .markdown-body ul {
        padding-left: 2em;
        margin-bottom: 16px;
    }
    
    .markdown-body li {
        margin-top: 0.25em;
    }
    
    .markdown-body code {
        padding: 0.2em 0.4em;
        margin: 0;
        font-size: 85%;
        background-color: #f6f8fa;
        border-radius: 6px;
        font-family: SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;
    }
    
    .markdown-body pre {
        padding: 16px;
        overflow: auto;
        font-size: 85%;
        line-height: 1.45;
        background-color: #f6f8fa;
        border-radius: 6px;
        margin-bottom: 16px;
    }
    
    .markdown-body pre code {
        background-color: transparent;
        padding: 0;
    }
    
    .markdown-body blockquote {
        padding: 0 1em;
        color: #6a737d;
        border-left: 0.25em solid #dfe2e5;
        margin: 0 0 16px 0;
    }
    
    .markdown-body table {
        border-spacing: 0;
        border-collapse: collapse;
        margin-bottom: 16px;
        width: 100%;
        overflow: auto;
    }
    
    .markdown-body table th,
    .markdown-body table td {
        padding: 6px 13px;
        border: 1px solid #dfe2e5;
    }
    
    .markdown-body table th {
        font-weight: 600;
        background-color: #f6f8fa;
    }
    
    .markdown-body table tr:nth-child(2n) {
        background-color: #f6f8fa;
    }
    
    .markdown-body img {
        max-width: 100%;
        box-sizing: border-box;
        background-color: #fff;
    }
    
    /* Custom Badges alignment */
    .markdown-body p img[alt*="Badge"] {
        vertical-align: middle;
        margin-right: 5px;
    }
</style>
{% endblock %}
